<!DOCTYPE html>
<html lang="en" class="h-full"
      x-data="{ darkMode: localStorage.getItem('darkMode') !== 'false' }"
      x-init="$watch('darkMode', val => localStorage.setItem('darkMode', val))"
      :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bean's Burritos{% endblock %}</title>
    <!-- Anti-FOUC: set dark class synchronously before any paint so page loads never flash white -->
    <script>
        (function() {
            try {
                var dark = localStorage.getItem('darkMode') !== 'false';
                if (dark) document.documentElement.classList.add('dark');
            } catch (e) { document.documentElement.classList.add('dark'); }
        })();
    </script>
    <style>
        html { background-color: #fafaf9; color: #1c1917; }
        html.dark { background-color: #0c0a09; color: #f5f5f4; }
        body { background-color: inherit; }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Cinzel:wght@600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                        display: ['Cinzel', 'Georgia', 'serif'],
                    },
                    colors: {
                        brand: {
                            50:  '#fff7ed',
                            100: '#ffedd5',
                            200: '#fed7aa',
                            300: '#fdba74',
                            400: '#fb923c',
                            500: '#f97316',
                            600: '#ea580c',
                            700: '#c2410c',
                            800: '#9a3412',
                            900: '#7c2d12',
                            950: '#431407',
                        },
                        surface: {
                            50:  '#fafaf9',
                            100: '#f5f5f4',
                            200: '#e7e5e4',
                            300: '#d6d3d1',
                            400: '#a8a29e',
                            500: '#78716c',
                            600: '#57534e',
                            700: '#44403c',
                            800: '#292524',
                            900: '#1c1917',
                            950: '#0c0a09',
                        },
                    },
                    animation: {
                        'fade-in':   'fadeIn 0.4s ease-out',
                        'slide-up':  'slideUp 0.4s ease-out',
                        'dice-roll': 'diceRoll 0.6s cubic-bezier(0.4, 0, 0.2, 1)',
                        'shake':     'shake 0.45s ease-in-out',
                        'd20-roll':  'd20Roll 4.2s cubic-bezier(0.5, 0.1, 0.5, 0.9) infinite',
                        'd20-glow':  'd20Glow 2.1s ease-in-out infinite alternate',
                        'face-pop':  'facePop 1.4s ease-out infinite',
                    },
                    keyframes: {
                        fadeIn:   { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp:  { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        diceRoll: {
                            '0%':   { transform: 'rotate(0deg) scale(1)' },
                            '25%':  { transform: 'rotate(-20deg) scale(1.1)' },
                            '50%':  { transform: 'rotate(360deg) scale(1.2)' },
                            '75%':  { transform: 'rotate(340deg) scale(1.05)' },
                            '100%': { transform: 'rotate(360deg) scale(1)' },
                        },
                        shake: {
                            '0%, 100%': { transform: 'translateX(0)' },
                            '20%':      { transform: 'translateX(-10px)' },
                            '40%':      { transform: 'translateX(10px)' },
                            '60%':      { transform: 'translateX(-8px)' },
                            '80%':      { transform: 'translateX(8px)' },
                        },
                        d20Roll: {
                            '0%':   { transform: 'rotateX(0deg)   rotateY(0deg)   rotateZ(0deg)' },
                            '20%':  { transform: 'rotateX(144deg) rotateY(72deg)  rotateZ(20deg)' },
                            '40%':  { transform: 'rotateX(288deg) rotateY(216deg) rotateZ(-10deg)' },
                            '60%':  { transform: 'rotateX(72deg)  rotateY(360deg) rotateZ(30deg)' },
                            '80%':  { transform: 'rotateX(216deg) rotateY(504deg) rotateZ(-20deg)' },
                            '100%': { transform: 'rotateX(360deg) rotateY(720deg) rotateZ(0deg)' },
                        },
                        d20Glow: {
                            '0%':   { filter: 'drop-shadow(0 0 2px rgba(249,115,22,0.4))' },
                            '100%': { filter: 'drop-shadow(0 0 10px rgba(249,115,22,0.9)) drop-shadow(0 0 20px rgba(249,115,22,0.4))' },
                        },
                        facePop: {
                            '0%':   { opacity: '0', transform: 'translate(-50%,-50%) scale(0.6)' },
                            '20%':  { opacity: '1', transform: 'translate(-50%,-50%) scale(1.15)' },
                            '40%':  { opacity: '1', transform: 'translate(-50%,-50%) scale(1)' },
                            '85%':  { opacity: '1', transform: 'translate(-50%,-50%) scale(1)' },
                            '100%': { opacity: '0', transform: 'translate(-50%,-50%) scale(0.8)' },
                        },
                    },
                },
            },
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }

        html:not(.dark) body {
            background-image:
                radial-gradient(at 0% 0%, rgba(251, 146, 60, 0.18) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(234, 88, 12, 0.10) 0px, transparent 50%),
                radial-gradient(at 50% 100%, rgba(253, 186, 116, 0.12) 0px, transparent 55%);
        }
        html.dark body {
            background-image:
                radial-gradient(at 0% 0%, rgba(234, 88, 12, 0.18) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(124, 45, 18, 0.25) 0px, transparent 50%),
                radial-gradient(at 50% 100%, rgba(249, 115, 22, 0.08) 0px, transparent 55%);
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #44403c; }
    </style>
</head>
<body class="min-h-full font-sans antialiased bg-surface-50 text-surface-900 dark:bg-surface-950 dark:text-surface-100 transition-colors">

    <header class="border-b border-dashed border-surface-300 dark:border-surface-800">
        <div class="max-w-3xl mx-auto px-5 pt-6 pb-5 flex items-center justify-between gap-4">
            <!-- Rolling d20 widget — real 3D via Three.js with numbers painted on every face -->
            <a href="{{ url_for('index') }}" class="shrink-0 flex items-center gap-3 group">
                <div id="d20-canvas" class="relative w-16 h-16 sm:w-20 sm:h-20"></div>
                <div class="flex flex-col leading-tight">
                    <span class="font-display font-black text-2xl sm:text-3xl text-brand-700 dark:text-brand-400 tracking-wide group-hover:text-brand-600 transition-colors">Bean's Burritos</span>
                    <span class="italic text-xs text-surface-600 dark:text-surface-400">Roll initiative. Then roll your burrito.</span>
                </div>
            </a>

            <button @click="darkMode = !darkMode"
                    class="shrink-0 w-9 h-9 rounded-lg border border-surface-300 dark:border-surface-700 bg-white dark:bg-surface-900 text-surface-700 dark:text-surface-300 hover:border-brand-500 hover:text-brand-600 dark:hover:text-brand-400 transition-colors grid place-items-center"
                    aria-label="Toggle dark mode">
                <svg x-show="!darkMode" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
                <svg x-show="darkMode" x-cloak class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m8.485-8.485h-1M4.515 12h-1m14.142-6.364l-.707.707M6.05 17.95l-.707.707m12.728 0l-.707-.707M6.05 6.05l-.707-.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
            </button>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-5 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Three.js 3D d20 scene — flat-lit numbered faces + roll/land/pause cycle -->
    <script>
        (function initD20Scene() {
            if (typeof THREE === 'undefined') return setTimeout(initD20Scene, 50);
            const container = document.getElementById('d20-canvas');
            if (!container) return;
            const width  = container.clientWidth;
            const height = container.clientHeight;
            if (!width || !height) return setTimeout(initD20Scene, 50);

            if (document.fonts && document.fonts.ready) {
                document.fonts.ready.then(buildScene);
            } else {
                buildScene();
            }

            // UV triangle placed inside the square texture. Each face samples this
            // triangle, so the number is drawn at its centroid.
            // Apex (0.5, 0.94) + base (0.09, 0.19) / (0.91, 0.19)
            // Centroid: (0.5, (0.94 + 0.19 + 0.19) / 3) = (0.5, 0.44)
            const UV_CENTROID_Y = (0.94 + 0.19 + 0.19) / 3;

            function makeFaceTexture(num) {
                const size = 256;
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');

                // Flat brand-orange face (MeshBasicMaterial renders this as-is, no lighting wash)
                ctx.fillStyle = '#ea580c'; // brand-600
                ctx.fillRect(0, 0, size, size);

                // Draw the number at the canvas position matching the UV triangle centroid.
                // CanvasTexture flips Y by default, so canvas Y = size * (1 - uvY).
                const cx = size / 2;
                const cy = size * (1 - UV_CENTROID_Y);

                ctx.font = '700 70px "Cinzel", Georgia, serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.lineWidth = 4;
                ctx.strokeStyle = '#431407'; // brand-950 — thin dark outline only
                ctx.strokeText(String(num), cx, cy);
                ctx.fillStyle = '#fff7ed'; // brand-50
                ctx.fillText(String(num), cx, cy);

                // Underline 6 and 9 (standard D&D die convention)
                if (num === 6 || num === 9) {
                    ctx.lineWidth = 3;
                    ctx.strokeStyle = '#fff7ed';
                    ctx.beginPath();
                    ctx.moveTo(cx - 16, cy + 26);
                    ctx.lineTo(cx + 16, cy + 26);
                    ctx.stroke();
                }

                const texture = new THREE.CanvasTexture(canvas);
                texture.anisotropy = 4;
                return texture;
            }

            function buildScene() {
                const scene    = new THREE.Scene();
                const camera   = new THREE.PerspectiveCamera(45, width / height, 0.1, 100);
                camera.position.z = 3.4;

                const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                renderer.setSize(width, height);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
                container.appendChild(renderer.domElement);

                const geometry = new THREE.IcosahedronGeometry(1.2, 0);

                // Override UVs — each face's 3 vertices form an upward-pointing triangle
                const uv = geometry.getAttribute('uv');
                for (let i = 0; i < 20; i++) {
                    uv.setXY(i * 3,     0.50, 0.94); // apex (vertex v0)
                    uv.setXY(i * 3 + 1, 0.09, 0.19); // bottom-left  (v1)
                    uv.setXY(i * 3 + 2, 0.91, 0.19); // bottom-right (v2)
                }
                uv.needsUpdate = true;

                // Per-face material groups
                geometry.clearGroups();
                for (let i = 0; i < 20; i++) {
                    geometry.addGroup(i * 3, 3, i);
                }

                // MeshBasicMaterial — ignores lights entirely, so all 20 faces render with
                // the exact same brightness and every number is legible.
                const materials = [];
                for (let i = 1; i <= 20; i++) {
                    materials.push(new THREE.MeshBasicMaterial({
                        map: makeFaceTexture(i),
                    }));
                }

                const mesh = new THREE.Mesh(geometry, materials);
                scene.add(mesh);

                // Dark edge lines so the 3D facets still read
                const edges     = new THREE.EdgesGeometry(geometry);
                const edgeLines = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x431407 }));
                mesh.add(edgeLines);

                // Pre-compute a target quaternion for every face so we can snap the die
                // so that face is square to the camera AND its number is upright.
                const positions = geometry.getAttribute('position');
                const faceTargets = [];
                const upZ = new THREE.Vector3(0, 0, 1);
                const upY = new THREE.Vector3(0, 1, 0);
                for (let i = 0; i < 20; i++) {
                    const v0 = new THREE.Vector3(positions.getX(i*3),     positions.getY(i*3),     positions.getZ(i*3));
                    const v1 = new THREE.Vector3(positions.getX(i*3 + 1), positions.getY(i*3 + 1), positions.getZ(i*3 + 1));
                    const v2 = new THREE.Vector3(positions.getX(i*3 + 2), positions.getY(i*3 + 2), positions.getZ(i*3 + 2));

                    const normal = new THREE.Vector3().addVectors(v0, v1).add(v2).divideScalar(3).normalize();

                    // Rotation 1: align this face's normal with +Z (straight at camera)
                    const q1 = new THREE.Quaternion().setFromUnitVectors(normal, upZ);

                    // Rotation 2: spin around +Z so v0 (the UV apex) ends up at the top (+Y)
                    const v0Rotated = v0.clone().applyQuaternion(q1);
                    const angle = Math.atan2(v0Rotated.x, v0Rotated.y);
                    const q2 = new THREE.Quaternion().setFromAxisAngle(upZ, -angle);

                    faceTargets.push(q2.multiply(q1));
                }

                // State machine: rolling (chaotic) → landing (slerp to target) → paused (hold)
                const ROLL_MS   = 2000;
                const LAND_MS   = 550;
                const PAUSE_MS  = 1500;
                let phase = 'rolling';
                let phaseElapsed = 0;
                let lastTs = performance.now();
                let velX = 0, velY = 0, velZ = 0;

                const fromQuat  = new THREE.Quaternion();
                const toQuat    = new THREE.Quaternion();
                const deltaQuat = new THREE.Quaternion();
                const deltaEul  = new THREE.Euler();

                function randomizeVelocity() {
                    const sign = () => (Math.random() > 0.5 ? 1 : -1);
                    velX = (0.025 + Math.random() * 0.025) * sign();
                    velY = (0.030 + Math.random() * 0.030) * sign();
                    velZ = (0.012 + Math.random() * 0.018) * sign();
                }
                randomizeVelocity();

                const easeOut = t => 1 - Math.pow(1 - t, 3);

                function animate(now) {
                    requestAnimationFrame(animate);
                    const delta = Math.min(now - lastTs, 80);
                    lastTs = now;
                    phaseElapsed += delta;
                    const frameFactor = delta / 16;

                    if (phase === 'rolling') {
                        deltaEul.set(velX * frameFactor, velY * frameFactor, velZ * frameFactor);
                        deltaQuat.setFromEuler(deltaEul);
                        mesh.quaternion.multiply(deltaQuat);

                        if (phaseElapsed >= ROLL_MS) {
                            phase = 'landing';
                            phaseElapsed = 0;
                            const faceIdx = Math.floor(Math.random() * 20);
                            fromQuat.copy(mesh.quaternion);
                            toQuat.copy(faceTargets[faceIdx]);
                        }
                    } else if (phase === 'landing') {
                        const t = Math.min(phaseElapsed / LAND_MS, 1);
                        mesh.quaternion.copy(fromQuat).slerp(toQuat, easeOut(t));
                        if (t >= 1) {
                            phase = 'paused';
                            phaseElapsed = 0;
                        }
                    } else if (phase === 'paused') {
                        if (phaseElapsed >= PAUSE_MS) {
                            phase = 'rolling';
                            phaseElapsed = 0;
                            randomizeVelocity();
                        }
                    }

                    renderer.render(scene, camera);
                }
                requestAnimationFrame(animate);
            }
        })();
    </script>

</body>
</html>
