<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Bean's Burritos{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header">
        <a class="brand" href="{{ url_for('index') }}">
            <span class="brand-icon">&#x1F32F;</span>
            <span class="brand-name">Bean's Burritos</span>
        </a>
        <p class="brand-tag">Roll initiative. Then roll your burrito.</p>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <p>Bean's Burritos &middot; A one-night-only pop-up for a D&amp;D day that will be talked about for edition cycles to come.</p>
    </footer>
</body>
</html>
